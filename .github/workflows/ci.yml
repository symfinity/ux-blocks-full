name: CI

# Metapackage — boundary PHPUnit/PHPStan + composer validate (no bundle src/).
# Matrix: maintained PHP x maintained Symfony (floor 7.4.*).
# Regenerated 2026-06-27 — refresh: split-mirror-docs/scripts/fetch-ci-matrix.sh --gha-json --package-php='>=8.2'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', symfony: '7.4' }
          - { php: '8.3', symfony: '7.4' }
          - { php: '8.4', symfony: '7.4' }
          - { php: '8.5', symfony: '7.4' }
          - { php: '8.4', symfony: '8.0' }
          - { php: '8.5', symfony: '8.0' }
          - { php: '8.4', symfony: '8.1' }
          - { php: '8.5', symfony: '8.1' }

    name: PHPUnit + PHPStan (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }}.*)

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, curl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Resolve Symfinity tiers from GitHub mirrors
        run: |
          composer config --unset repositories
          for repo in ux-blocks-core ux-blocks-form ux-blocks-extended ux-blocks-interactive ux-blocks-live; do
            composer config "repositories.symfinity-${repo}" "{\"type\":\"vcs\",\"url\":\"https://github.com/symfinity/${repo}\"}"
          done

      - name: Pin Symfony ${{ matrix.symfony }}
        run: |
          composer require --no-update \
            symfony/config:^${{ matrix.symfony }} \
            symfony/dependency-injection:^${{ matrix.symfony }} \
            symfony/framework-bundle:^${{ matrix.symfony }} \
            symfony/http-foundation:^${{ matrix.symfony }} \
            symfony/http-kernel:^${{ matrix.symfony }} \
            symfony/twig-bundle:^${{ matrix.symfony }} \
            symfony/yaml:^${{ matrix.symfony }}

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit --colors=always

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M
